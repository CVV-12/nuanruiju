<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>叠叠高 — Stack Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 500px;
    max-height: 800px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .score-display {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 72px;
    font-weight: 200;
    color: #fff;
    letter-spacing: 2px;
  }

  .message {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    margin-top: 12px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    letter-spacing: 2px;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  .ghost-bar {
    position: absolute;
    background: rgba(255,255,255,0.15);
  }

  .restart-btn {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 12px 36px;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.3s;
    font-family: inherit;
    display: none;
  }
  .restart-btn:hover { background: rgba(255,255,255,0.2); }
  .restart-btn.show { display: block; }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="game"></canvas>
  <div class="overlay">
    <div class="score-display" id="score">0</div>
    <div class="message" id="message"></div>
  </div>
  <div class="hint" id="hint">点击屏幕放置方块</div>
  <button class="restart-btn" id="restart" onclick="restartGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');
const hintEl = document.getElementById('hint');
const restartBtn = document.getElementById('restart');

let W, H;

function resize() {
  const wrapper = canvas.parentElement;
  W = wrapper.clientWidth;
  H = wrapper.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

// ---- Game State ----
const BOX_HEIGHT = 28;
const SPEED_BASE = 2.2;
const COLORS = [
  '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71',
  '#1abc9c', '#3498db', '#9b59b6', '#e91e63',
  '#00bcd4', '#ff5722', '#8bc34a', '#ff9800'
];

let blocks = [];         // { x, y, w, color } — each placed box
let current = null;      // { x, w, dir, speed, color }
let cameraY = 0;
let score = 0;
let gameOver = false;
let baseW;  // width of top-most placed block

function baseBlock() {
  if (blocks.length === 0) return { x: 0, w: W * 0.6 };
  const top = blocks[blocks.length - 1];
  return { x: top.x, w: top.w };
}

function randColor() {
  return COLORS[Math.floor(Math.random() * COLORS.length)];
}

function spawnBlock() {
  const base = baseBlock();
  const w = base.w;
  const dir = Math.random() < 0.5 ? 1 : -1;
  const startX = dir === 1 ? -w : W;
  const speed = SPEED_BASE + score * 0.08;
  current = {
    x: startX,
    w: w,
    dir: dir,
    speed: speed,
    color: randColor(),
  };
}

function init() {
  blocks = [];
  score = 0;
  cameraY = 0;
  gameOver = false;
  baseW = W * 0.6;
  blocks.push({ x: (W - baseW) / 2, y: H - BOX_HEIGHT - 40, w: baseW, color: randColor() });
  spawnBlock();
  updateUI();
  restartBtn.classList.remove('show');
  hintEl.style.display = 'block';
}

function placeBlock() {
  if (gameOver || !current) return;
  hintEl.style.display = 'none';

  const base = blocks[blocks.length - 1];
  const overlap = getOverlap(current, base);

  if (overlap <= 0) {
    // missed completely
    gameOver = true;
    messageEl.textContent = '差一点点！';
    restartBtn.classList.add('show');
    return;
  }

  // Cut to overlap region
  const newX = Math.max(current.x, base.x);
  const newW = overlap;

  // Check if perfect (within 4px)
  const perfect = Math.abs(current.x - base.x) < 5;

  blocks.push({
    x: newX,
    y: base.y - BOX_HEIGHT,
    w: newW,
    color: current.color,
  });

  score++;
  updateUI();

  if (perfect) {
    messageEl.textContent = '完美！';
    // slightly widen the next block
    baseW = Math.min(newW * 1.1, W * 0.7);
  } else {
    messageEl.textContent = '';
    baseW = newW;
  }

  // Scroll camera
  const targetY = blocks[blocks.length - 1].y - H * 0.4;
  cameraY = targetY;

  // Remove blocks that are far off screen
  while (blocks.length > 20) blocks.shift();

  spawnBlock();

  // If block got too narrow
  if (baseW < 10) {
    gameOver = true;
    messageEl.textContent = '太窄了！';
    restartBtn.classList.add('show');
  }
}

function getOverlap(a, b) {
  const left = Math.max(a.x, b.x);
  const right = Math.min(a.x + a.w, b.x + b.w);
  return Math.max(0, right - left);
}

function updateUI() {
  scoreEl.textContent = score;
  if (gameOver) {
    restartBtn.classList.add('show');
  }
}

// ---- Input ----
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  placeBlock();
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) return;
  placeBlock();
});

window.restartGame = () => {
  init();
};

// ---- Render ----
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#16213e');
  bgGrad.addColorStop(0.5, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f0f23');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  const gs = 40;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = (cameraY % gs); y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Draw placed blocks
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 8;
  for (const b of blocks) {
    const sy = b.y - cameraY;
    if (sy > H + 50 || sy < -100) continue;
    drawBlock(b.x, sy, b.w, BOX_HEIGHT, b.color, 1);
  }
  ctx.shadowBlur = 0;

  // Draw current moving block
  if (current && !gameOver) {
    const base = blocks[blocks.length - 1];
    const sy = base.y - BOX_HEIGHT - cameraY;

    // Ghost
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(base.x, sy, base.w, BOX_HEIGHT);

    // Moving block
    drawBlock(current.x, sy, current.w, BOX_HEIGHT, current.color, 0.9);
  }

  // Perfect line indicator
  if (blocks.length > 1 && !gameOver) {
    const last = blocks[blocks.length - 1];
    const sy = last.y - cameraY;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(last.x, sy + BOX_HEIGHT / 2);
    ctx.lineTo(last.x + last.w, sy + BOX_HEIGHT / 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Game Over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = '300 32px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W / 2, H / 2 - 20);
    ctx.font = '16px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 + 24);
  }
}

function drawBlock(x, y, w, h, color, alpha) {
  ctx.globalAlpha = alpha;

  // Main face
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  ctx.fillStyle = grad;
  roundRect(x, y, w, h, 3);
  ctx.fill();

  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 2, y + 1, w - 4, 4);

  // Side 3D effect
  ctx.fillStyle = shadeColor(color, -20);
  ctx.fillRect(x, y + h - 3, w, 3);

  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return `rgb(${R},${G},${B})`;
}

// ---- Loop ----
function update() {
  if (gameOver || !current) return;

  current.x += current.dir * current.speed;

  const base = blocks[blocks.length - 1];
  // Bounce at edges
  if (current.dir === 1 && current.x + current.w >= W) {
    current.dir = -1;
  } else if (current.dir === -1 && current.x <= 0) {
    current.dir = 1;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---- Init ----
init();
loop();

// Handle window resize for base block
window.addEventListener('resize', () => {
  resize();
  if (blocks.length > 0 && !gameOver) {
    // Recenter
  }
});
</script>
</body>
</html>
