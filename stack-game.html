<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>蛋糕叠叠乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2c1810;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .game-wrapper {
    position: relative;
    width: 100vw; height: 100vh;
    max-width: 500px; max-height: 800px;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .score-display {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 64px;
    font-weight: 200;
    color: #fff;
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .message {
    position: absolute;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    color: rgba(255,255,255,0.8);
    font-weight: 300;
    letter-spacing: 1px;
    z-index: 10;
    pointer-events: none;
    min-height: 24px;
  }

  .hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 2px;
    animation: blink 2s infinite;
    z-index: 10;
    pointer-events: none;
  }
  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  .restart-btn {
    position: absolute;
    bottom: 130px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 12px 36px;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    pointer-events: auto;
    z-index: 10;
    transition: all 0.3s;
    font-family: inherit;
    display: none;
  }
  .restart-btn:hover { background: rgba(255,255,255,0.22); }
  .restart-btn.show { display: block; }

  .rules {
    position: absolute;
    top: 16px; left: 16px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    line-height: 1.8;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
  .rules span { color: #ffd93d; }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="game"></canvas>
  <div class="rules">
    规则：<br>
    · 点击放置蛋糕层<br>
    · <span>完美对齐</span> +2 分<br>
    · 偏差对齐 +1 分<br>
    · 未对齐则游戏结束
  </div>
  <div class="score-display" id="score">0</div>
  <div class="message" id="message"></div>
  <div class="hint" id="hint">点击屏幕放置蛋糕</div>
  <button class="restart-btn" id="restart" onclick="restartGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');
const hintEl = document.getElementById('hint');
const restartBtn = document.getElementById('restart');

let W, H;

function resize() {
  const wrapper = canvas.parentElement;
  W = wrapper.clientWidth;
  H = wrapper.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

// ---- Game State ----
const BOX_HEIGHT = 30;
const SPEED_BASE = 10;
const MIN_WIDTH = 10;
const SHRINK_RATE = 0.45;
const PERFECT_THRESHOLD = 3;

// Cake styles: { name, sponge, cream, topping }
const CAKE_TYPES = [
  { name:'草莓蛋糕', sponge:'#f2a0b0', cream:'#fff5f5', top:'#e85d75' },
  { name:'巧克力蛋糕', sponge:'#6b3a2a', cream:'#faf0e6', top:'#4a2518' },
  { name:'抹茶蛋糕', sponge:'#7da870', cream:'#f5faf0', top:'#4a7c3f' },
  { name:'香草蛋糕', sponge:'#f5e6c8', cream:'#fffef9', top:'#d4a853' },
  { name:'蓝莓蛋糕', sponge:'#9b8ec4', cream:'#f8f5ff', top:'#6b5a9e' },
  { name:'橙香蛋糕', sponge:'#f5c092', cream:'#fffaf5', top:'#e08a3e' },
  { name:'红丝绒', sponge:'#c0392b', cream:'#fffafa', top:'#8b0000' },
  { name:'柠檬蛋糕', sponge:'#f5e98c', cream:'#fffff5', top:'#c9b820' },
];

let blocks = [];
let current = null;
let cameraY = 0;
let score = 0;
let combo = 0;
let gameOver = false;
let baseW;
let shrinkActive = false;

function randCake() {
  return CAKE_TYPES[Math.floor(Math.random() * CAKE_TYPES.length)];
}

function baseBlock() {
  if (blocks.length === 0) return { x: 0, w: W * 0.55 };
  const top = blocks[blocks.length - 1];
  return { x: top.x, w: top.w };
}

function spawnBlock() {
  const base = baseBlock();
  const dir = Math.random() < 0.5 ? 1 : -1;
  const w = base.w;
  const startX = dir === 1 ? -w : W;
  const speed = SPEED_BASE + Math.pow(2, score / 3) * 0.15 + (Math.random() - 0.5) * 0.6;
  current = {
    x: startX,
    originW: w,
    w: w,
    dir: dir,
    speed: speed,
    cake: randCake(),
    traveled: 0,
  };
}

function init() {
  blocks = [];
  score = 0;
  combo = 0;
  cameraY = 0;
  gameOver = false;
  shrinkActive = false;
  baseW = W * 0.55;
  blocks.push({ x: (W - baseW) / 2, y: H - BOX_HEIGHT - 40, w: baseW, cake: randCake() });
  spawnBlock();
  scoreEl.textContent = '0';
  restartBtn.classList.remove('show');
  hintEl.style.display = 'block';
  messageEl.textContent = '';
}

function placeBlock() {
  if (gameOver || !current) return;
  hintEl.style.display = 'none';

  const base = blocks[blocks.length - 1];
  const overlap = getOverlap(current, base);

  if (overlap <= 0) {
    gameOver = true;
    messageEl.textContent = combo > 2 ? `连击 ${combo} 次！` : '没对齐……';
    restartBtn.classList.add('show');
    return;
  }

  const newX = Math.max(current.x, base.x);
  const newW = overlap;
  const perfect = Math.abs(current.x - base.x) < PERFECT_THRESHOLD;

  blocks.push({
    x: newX,
    y: base.y - BOX_HEIGHT,
    w: newW,
    cake: current.cake,
  });

  if (perfect) {
    combo++;
    score += 2;  // 完美 +2
    if (combo >= 5) {
      messageEl.textContent = `🔥 ${combo}连击! +2`;
    } else if (combo >= 3) {
      messageEl.textContent = `✨ ${combo}连击! +2`;
    } else {
      messageEl.textContent = '完美对齐! +2';
    }
    baseW = Math.min(newW * 1.08 + combo * 0.8, W * 0.6);
  } else {
    combo = 0;
    score += 1;  // 普通 +1
    messageEl.textContent = '+1';
    baseW = newW;
  }

  if (score >= 3) shrinkActive = true;

  const targetY = blocks[blocks.length - 1].y - H * 0.4;
  cameraY = targetY;

  while (blocks.length > 25) blocks.shift();
  spawnBlock();

  if (baseW < MIN_WIDTH) {
    gameOver = true;
    messageEl.textContent = `太窄了！`;
    restartBtn.classList.add('show');
  }

  scoreEl.textContent = score;
  if (gameOver) restartBtn.classList.add('show');
}

function getOverlap(a, b) {
  const left = Math.max(a.x, b.x);
  const right = Math.min(a.x + a.w, b.x + b.w);
  return Math.max(0, right - left);
}

// ---- Input ----
canvas.addEventListener('click', () => { if (!gameOver) placeBlock(); });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameOver) placeBlock();
});

window.restartGame = () => init();

// ---- Draw Cake ----
function drawCake(x, y, w, h, cake, alpha) {
  ctx.globalAlpha = alpha;

  const spongeH = h * 0.6;
  const creamH = h * 0.4;

  // Sponge (cake body)
  const sGrad = ctx.createLinearGradient(x, y + creamH, x, y + h);
  sGrad.addColorStop(0, cake.sponge);
  sGrad.addColorStop(1, shadeColor(cake.sponge, -25));
  ctx.fillStyle = sGrad;
  roundRect(x, y + creamH, w, spongeH, 2);
  ctx.fill();

  // Sponge texture dots
  ctx.fillStyle = shadeColor(cake.sponge, -15);
  for (let i = 0; i < w * 1.5; i++) {
    const dx = x + 4 + Math.random() * (w - 8);
    const dy = y + creamH + 5 + Math.random() * (spongeH - 10);
    ctx.beginPath();
    ctx.arc(dx, dy, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Cream frosting (wavy top)
  ctx.fillStyle = cake.cream;
  ctx.beginPath();
  ctx.moveTo(x, y + creamH);
  const waves = Math.max(2, Math.floor(w / 12));
  for (let i = 0; i <= waves; i++) {
    const wx = x + (w / waves) * i;
    const wy = y + creamH - 4 + Math.sin(i * 1.5) * 3;
    ctx.lineTo(wx, wy);
  }
  ctx.lineTo(x + w, y + creamH);
  ctx.closePath();
  ctx.fill();

  // Frosting drip
  ctx.fillStyle = cake.cream;
  for (let i = 0; i < w / 8; i++) {
    const dx = x + 6 + i * 8 + Math.random() * 4;
    const dripH = 3 + Math.random() * 6;
    ctx.beginPath();
    ctx.arc(dx, y + creamH + 1, 3, 0, Math.PI);
    ctx.fill();
  }

  // Topping decoration
  ctx.fillStyle = cake.top;
  const toppingCount = Math.floor(w / 14);
  for (let i = 0; i < toppingCount; i++) {
    const tx = x + 8 + i * (w - 16) / Math.max(1, toppingCount - 1);
    const ty = y + creamH - 5 + (i % 2) * 4;
    // Alternate cherry / cream dot
    if (i % 3 === 0) {
      ctx.beginPath();
      ctx.arc(tx, ty - 4, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(tx - 1, ty - 5, 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = cake.top;
    } else {
      ctx.beginPath();
      ctx.arc(tx, ty, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x + 2, y + creamH + 1, w - 4, 2);

  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return `rgb(${R},${G},${B})`;
}

// ---- Render ----
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#3d2517');
  bgGrad.addColorStop(0.5, '#2c1810');
  bgGrad.addColorStop(1, '#1a0e08');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  const gs = 40;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = (cameraY % gs); y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Placed cakes
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 10;
  for (const b of blocks) {
    const sy = b.y - cameraY;
    if (sy > H + 60 || sy < -110) continue;
    drawCake(b.x, sy, b.w, BOX_HEIGHT, b.cake, 1);
  }
  ctx.shadowBlur = 0;

  // Moving cake
  if (current && !gameOver) {
    const base = blocks[blocks.length - 1];
    const sy = base.y - BOX_HEIGHT - cameraY;

    // Ghost
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(base.x, sy, base.w, BOX_HEIGHT);

    if (shrinkActive && current.w < current.originW * 0.5) {
      ctx.shadowColor = 'rgba(255,100,100,0.4)';
      ctx.shadowBlur = 16;
    }
    drawCake(current.x, sy, current.w, BOX_HEIGHT, current.cake, 0.9);
    ctx.shadowBlur = 0;

    // Shrink bar
    if (shrinkActive) {
      const shrinkPct = current.w / current.originW;
      const barW = base.w;
      const barX = base.x;
      const barY = sy - 6;
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(barX, barY, barW, 2);
      const barColor = shrinkPct > 0.5 ? '#2ecc71' : shrinkPct > 0.25 ? '#f1c40f' : '#e74c3c';
      ctx.fillStyle = barColor;
      ctx.fillRect(barX, barY, barW * shrinkPct, 2);
    }
  }

  // Combo
  if (combo >= 3 && !gameOver) {
    const last = blocks[blocks.length - 1];
    const sy = last.y - cameraY;
    ctx.fillStyle = '#ffd93d';
    ctx.font = 'bold 14px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`x${combo}`, last.x + last.w / 2, sy - 10);
  }

  // Perfect zone markers
  if (blocks.length > 1 && !gameOver) {
    const last = blocks[blocks.length - 1];
    const sy = last.y - cameraY;
    const hw = PERFECT_THRESHOLD;
    ctx.fillStyle = 'rgba(255,215,0,0.1)';
    ctx.fillRect(last.x - hw, sy, hw * 2, BOX_HEIGHT);
    ctx.fillRect(last.x + last.w - hw, sy, hw * 2, BOX_HEIGHT);
  }

  // Game Over (on canvas, positioned to avoid overlap with score)
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    const gy = H * 0.55;

    ctx.fillStyle = '#fff';
    ctx.font = '300 30px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W / 2, gy);

    ctx.font = '300 16px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`最终得分: ${score}`, W / 2, gy + 32);

    if (combo >= 3) {
      ctx.font = '300 14px "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffd93d';
      ctx.fillText(`最高连击: ${combo}x`, W / 2, gy + 56);
    }

    ctx.font = '300 12px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('点击按钮重新开始', W / 2, gy + 80);
  }
}

// ---- Update ----
function update() {
  if (gameOver || !current) return;

  current.x += current.dir * current.speed;
  current.traveled += current.speed;

  if (shrinkActive && current.traveled > 40) {
    const shrink = (current.traveled - 40) * SHRINK_RATE;
    current.w = Math.max(MIN_WIDTH, current.originW - shrink);
  }

  if (current.dir === 1 && current.x + current.w >= W) {
    current.dir = -1;
    current.speed += 0.5 + Math.pow(2, score / 3) * 0.03;
  } else if (current.dir === -1 && current.x <= 0) {
    current.dir = 1;
    current.speed += 0.5 + Math.pow(2, score / 3) * 0.03;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
