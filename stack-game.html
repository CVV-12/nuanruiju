<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>叠叠高 — Stack Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 500px;
    max-height: 800px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .score-display {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 72px;
    font-weight: 200;
    color: #fff;
    letter-spacing: 2px;
  }

  .message {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    margin-top: 12px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    letter-spacing: 2px;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  .ghost-bar {
    position: absolute;
    background: rgba(255,255,255,0.15);
  }

  .restart-btn {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 12px 36px;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.3s;
    font-family: inherit;
    display: none;
  }
  .restart-btn:hover { background: rgba(255,255,255,0.2); }
  .restart-btn.show { display: block; }
</style>
</head>
<body>

<div class="game-wrapper">
  <canvas id="game"></canvas>
  <div class="overlay">
    <div class="score-display" id="score">0</div>
    <div class="message" id="message"></div>
  </div>
  <div class="hint" id="hint">点击屏幕放置方块</div>
  <button class="restart-btn" id="restart" onclick="restartGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');
const hintEl = document.getElementById('hint');
const restartBtn = document.getElementById('restart');

let W, H;

function resize() {
  const wrapper = canvas.parentElement;
  W = wrapper.clientWidth;
  H = wrapper.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

// ---- Game State ----
const BOX_HEIGHT = 26;
const SPEED_BASE = 2.8;        // faster starting speed
const SPEED_PER_SCORE = 0.15;  // steeper ramp
const SHRINK_RATE = 0.25;      // block shrinks as it moves
const PERFECT_THRESHOLD = 3;   // tighter perfect window (was 5)
const MIN_WIDTH = 8;

const COLORS = [
  '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71',
  '#1abc9c', '#3498db', '#9b59b6', '#e91e63',
  '#00bcd4', '#ff5722', '#8bc34a', '#ff9800'
];

let blocks = [];
let current = null;
let cameraY = 0;
let score = 0;
let combo = 0;          // consecutive perfects
let gameOver = false;
let baseW;
let shrinkActive = false; // block only shrinks after first 5 placements

function baseBlock() {
  if (blocks.length === 0) return { x: 0, w: W * 0.55 };
  const top = blocks[blocks.length - 1];
  return { x: top.x, w: top.w };
}

function randColor() {
  return COLORS[Math.floor(Math.random() * COLORS.length)];
}

function spawnBlock() {
  const base = baseBlock();
  const dir = Math.random() < 0.5 ? 1 : -1;
  const w = base.w;
  const startX = dir === 1 ? -w : W;
  const speed = SPEED_BASE + score * SPEED_PER_SCORE + (Math.random() - 0.5) * 0.8;
  current = {
    x: startX,
    originW: w,
    w: w,
    dir: dir,
    speed: speed,
    color: randColor(),
    traveled: 0,
  };
}

function init() {
  blocks = [];
  score = 0;
  combo = 0;
  cameraY = 0;
  gameOver = false;
  shrinkActive = false;
  baseW = W * 0.55;
  blocks.push({ x: (W - baseW) / 2, y: H - BOX_HEIGHT - 40, w: baseW, color: randColor() });
  spawnBlock();
  updateUI();
  restartBtn.classList.remove('show');
  hintEl.style.display = 'block';
  messageEl.textContent = '';
}

function placeBlock() {
  if (gameOver || !current) return;
  hintEl.style.display = 'none';

  const base = blocks[blocks.length - 1];
  const overlap = getOverlap(current, base);

  if (overlap <= 0) {
    gameOver = true;
    messageEl.textContent = combo > 2 ? `连击 ${combo} 次！可惜了` : '差一点点！';
    restartBtn.classList.add('show');
    return;
  }

  const newX = Math.max(current.x, base.x);
  const newW = overlap;
  const perfect = Math.abs(current.x - base.x) < PERFECT_THRESHOLD;

  blocks.push({
    x: newX,
    y: base.y - BOX_HEIGHT,
    w: newW,
    color: current.color,
  });

  if (perfect) {
    combo++;
    const bonus = combo >= 5 ? 3 : combo >= 3 ? 2 : 1;
    score += bonus;
    messageEl.textContent = combo >= 5 ? `🔥 ${combo}连击! +${bonus}` : combo >= 3 ? `✨ ${combo}连击! +${bonus}` : '完美！';
    // combo bonus: width slightly restored
    baseW = Math.min(newW * 1.08 + combo * 0.8, W * 0.6);
  } else {
    combo = 0;
    messageEl.textContent = '';
    baseW = newW;
  }

  // Enable shrink after a few placements
  if (score >= 5) shrinkActive = true;

  // Scroll camera
  const targetY = blocks[blocks.length - 1].y - H * 0.4;
  cameraY = targetY;

  while (blocks.length > 25) blocks.shift();

  spawnBlock();

  if (baseW < MIN_WIDTH) {
    gameOver = true;
    messageEl.textContent = `太窄了！得分: ${score}`;
    restartBtn.classList.add('show');
  }

  updateUI();
}

function getOverlap(a, b) {
  const left = Math.max(a.x, b.x);
  const right = Math.min(a.x + a.w, b.x + b.w);
  return Math.max(0, right - left);
}

function updateUI() {
  scoreEl.textContent = score;
  if (gameOver) restartBtn.classList.add('show');
}

// ---- Input ----
canvas.addEventListener('click', () => { if (!gameOver) placeBlock(); });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameOver) placeBlock();
});

window.restartGame = () => init();

// ---- Render ----
function draw() {
  ctx.clearRect(0, 0, W, H);

  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#16213e');
  bgGrad.addColorStop(0.5, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f0f23');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const gs = 40;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = (cameraY % gs); y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Placed blocks
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 8;
  for (const b of blocks) {
    const sy = b.y - cameraY;
    if (sy > H + 50 || sy < -100) continue;
    drawBlock(b.x, sy, b.w, BOX_HEIGHT, b.color, 1);
  }
  ctx.shadowBlur = 0;

  // Moving block
  if (current && !gameOver) {
    const base = blocks[blocks.length - 1];
    const sy = base.y - BOX_HEIGHT - cameraY;

    // Ghost (shows where previous block was)
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(base.x, sy, base.w, BOX_HEIGHT);

    // Warning glow when block is shrinking
    if (shrinkActive && current.w < current.originW * 0.5) {
      ctx.shadowColor = 'rgba(255,100,100,0.4)';
      ctx.shadowBlur = 16;
    }

    drawBlock(current.x, sy, current.w, BOX_HEIGHT, current.color, 0.9);
    ctx.shadowBlur = 0;

    // Shrink indicator bar
    if (shrinkActive) {
      const shrinkPct = current.w / current.originW;
      const barW = base.w;
      const barX = base.x;
      const barY = sy - 8;
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(barX, barY, barW, 3);
      const barColor = shrinkPct > 0.5 ? '#2ecc71' : shrinkPct > 0.25 ? '#f1c40f' : '#e74c3c';
      ctx.fillStyle = barColor;
      ctx.fillRect(barX, barY, barW * shrinkPct, 3);
    }
  }

  // Combo indicator
  if (combo >= 3 && !gameOver) {
    const last = blocks[blocks.length - 1];
    const sy = last.y - cameraY;
    ctx.fillStyle = '#fff';
    ctx.font = '300 13px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`x${combo}`, last.x + last.w / 2, sy - 14);
  }

  // Perfect line
  if (blocks.length > 1 && !gameOver) {
    const last = blocks[blocks.length - 1];
    const sy = last.y - cameraY;
    const hw = PERFECT_THRESHOLD;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(last.x - hw, sy, hw * 2, BOX_HEIGHT);
    ctx.fillRect(last.x + last.w - hw, sy, hw * 2, BOX_HEIGHT);
  }

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = '300 34px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W / 2, H / 2 - 24);
    ctx.font = '15px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`得分: ${score}`, W / 2, H / 2 + 16);
    if (combo >= 3) {
      ctx.fillStyle = '#f1c40f';
      ctx.fillText(`最高连击: ${combo}x`, W / 2, H / 2 + 42);
    }
  }
}

function drawBlock(x, y, w, h, color, alpha) {
  ctx.globalAlpha = alpha;

  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  ctx.fillStyle = grad;
  roundRect(x, y, w, h, 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.16)';
  ctx.fillRect(x + 2, y + 1, w - 4, 3);

  ctx.fillStyle = shadeColor(color, -18);
  ctx.fillRect(x, y + h - 2, w, 2);

  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return `rgb(${R},${G},${B})`;
}

// ---- Update ----
function update() {
  if (gameOver || !current) return;

  current.x += current.dir * current.speed;
  current.traveled += current.speed;

  // Block SHRINKS as it travels (after warmup)
  if (shrinkActive && current.traveled > 40) {
    const shrink = (current.traveled - 40) * SHRINK_RATE;
    current.w = Math.max(MIN_WIDTH, current.originW - shrink);
  }

  // Bounce at edges
  if (current.dir === 1 && current.x + current.w >= W) {
    current.dir = -1;
    // Speed boost after bounce (adds difficulty)
    current.speed += 0.15;
  } else if (current.dir === -1 && current.x <= 0) {
    current.dir = 1;
    current.speed += 0.15;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
